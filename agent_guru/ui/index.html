<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>workflow-distiller</title>
<style>
  :root{
    --bg:#0f1115; --panel:#181b22; --panel2:#1f232c; --line:#2a2f3a;
    --txt:#e8eaed; --muted:#9aa3b2; --accent:#6ea8fe;
    --eliminate:#7a8290; --automate:#3ea6ff; --skill:#b388ff; --human:#ffb454;
    --good:#3ddc97; --bad:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font:14px/1.55 -apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 22px 80px}
  h1{font-size:20px;margin:0 0 4px;font-weight:650}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:22px}
  .banner{border-radius:14px;padding:20px 22px;margin-bottom:26px;
          background:linear-gradient(135deg,#13351f,#0f1115);border:1px solid #1c5236}
  .banner.bad{background:linear-gradient(135deg,#3a1417,#0f1115);border-color:#5a2226}
  .banner .big{font-size:22px;font-weight:700;letter-spacing:.2px}
  .banner .meta{color:var(--muted);font-size:12.5px;margin-top:8px}
  .banner .chips{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:#0f1115;border:1px solid var(--line);border-radius:999px;
        padding:3px 11px;font-size:12px;color:var(--muted)}
  .chip b{color:var(--txt)}
  section{margin-bottom:30px}
  h2{font-size:15px;margin:0 0 12px;font-weight:620;display:flex;align-items:center;gap:8px}
  h2 .n{color:var(--muted);font-weight:400;font-size:12.5px}
  table{width:100%;border-collapse:collapse;background:var(--panel);
        border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:var(--panel2);color:var(--muted);font-weight:600;font-size:12px}
  tr:last-child td{border-bottom:none}
  td .wf{font-weight:600}
  td .sm{color:var(--muted);font-size:12px;margin-top:3px}
  .badge{display:inline-block;padding:2px 9px;border-radius:6px;font-size:12px;font-weight:600;color:#0f1115}
  .b-eliminate{background:var(--eliminate)} .b-automate{background:var(--automate)}
  .b-skill{background:var(--skill)} .b-human{background:var(--human)}
  .bar{display:flex;height:8px;border-radius:5px;overflow:hidden;background:#0f1115;margin-top:6px;width:120px}
  .bar i{display:block;height:100%}
  .barlabel{font-size:11px;color:var(--muted);margin-top:4px}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
         border-radius:8px;padding:6px 9px;font-size:13px}
  .skill{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;
         padding:13px 15px;background:var(--panel);border:1px solid var(--line);
         border-radius:11px;margin-bottom:9px}
  .skill .nm{font-weight:600} .skill .ds{color:var(--muted);font-size:12px;margin-top:3px;max-width:680px}
  .flow{color:var(--muted);font-size:11.5px;margin-top:6px}
  .err{color:var(--bad);font-size:13px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:-4px 0 14px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <h1>workflow-distiller</h1>
  <div class="sub">静默旁观你用 AI 干活，把复发工作流蒸馏进四个桶 —— 消除 / 自动化 / Skill / 人，让时间向不可替代的人类部分迁移。</div>

  <div id="banner" class="banner"><div class="big">载入中…</div></div>

  <section>
    <h2>Workflow Map <span class="n" id="mapcount"></span></h2>
    <div class="legend">
      <span><i class="dot b-eliminate"></i>消除</span>
      <span><i class="dot b-automate"></i>自动化</span>
      <span><i class="dot b-skill"></i>Skill</span>
      <span><i class="dot b-human"></i>人</span>
    </div>
    <div id="maphead" class="sub"></div>
    <table id="maptable"><thead><tr>
      <th>工作流</th><th>主桶</th><th>频率</th><th>估时/次</th><th>步骤分桶</th><th>下一步</th>
    </tr></thead><tbody id="mapbody"><tr><td colspan="6">载入中…</td></tr></tbody></table>
  </section>

  <section>
    <h2>Skills · 自主度配置 <span class="n">桶向下流动：建议 → 待批草稿 → 自动+通知 → 全自动</span></h2>
    <div id="skills"><div class="sub">载入中…</div></div>
  </section>
</div>

<script>
const BUCKETS = ["eliminate","automate","skill","human"];
const BCOLOR = {eliminate:"var(--eliminate)",automate:"var(--automate)",skill:"var(--skill)",human:"var(--human)"};
const BZH = {eliminate:"消除",automate:"自动化",skill:"Skill",human:"人"};
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function loadBanner(){
  const s = await (await fetch("/api/savings?days=7")).json();
  const el = document.getElementById("banner");
  el.className = "banner" + (s.net_min < 0 ? " bad" : "");
  el.innerHTML = `<div class="big">${esc(s.punchline)}</div>
    <div class="meta">${s.n_runs} 次自动化/Skill 运行（近 ${s.window_days} 天）· 估算口径，含负值</div>
    <div class="chips">
      <span class="chip">省 <b>~${s.saved_min}min</b></span>
      <span class="chip">开销 <b>~${s.overhead_min}min</b></span>
      <span class="chip">净 <b>~${s.net_min}min</b></span>
    </div>`;
}

function bucketBar(steps){
  const c = {eliminate:0,automate:0,skill:0,human:0};
  (steps||[]).forEach(st=>{ if(c[st.bucket]!=null) c[st.bucket]++; });
  const total = Object.values(c).reduce((a,b)=>a+b,0)||1;
  const segs = BUCKETS.filter(b=>c[b]>0)
    .map(b=>`<i style="width:${c[b]/total*100}%;background:${BCOLOR[b]}"></i>`).join("");
  const lbl = BUCKETS.filter(b=>c[b]>0).map(b=>`${BZH[b]}×${c[b]}`).join(" / ");
  return `<div class="bar">${segs}</div><div class="barlabel">${lbl||"-"}</div>`;
}

async function loadMap(){
  const m = await (await fetch("/api/map")).json();
  document.getElementById("maphead").textContent = m.headline || "";
  document.getElementById("mapcount").textContent =
    `${(m.workflows||[]).length} 条 · 观察 ${m.n_sessions||"?"} session + ${m.n_meetings||"?"} 会议`;
  const body = document.getElementById("mapbody");
  if(!(m.workflows||[]).length){ body.innerHTML='<tr><td colspan="6">还没跑 distill</td></tr>'; return; }
  body.innerHTML = m.workflows.map(w=>`
    <tr>
      <td><div class="wf">${esc(w.name)}</div><div class="sm">${esc(w.summary||"")}</div></td>
      <td><span class="badge b-${w.primary_bucket}">${BZH[w.primary_bucket]||esc(w.primary_bucket)}</span></td>
      <td>${esc(w.frequency)}</td>
      <td>~${esc(w.est_minutes_per_run)}min<div class="sm">×${esc(w.n_observed)}</div></td>
      <td>${bucketBar(w.steps)}</td>
      <td>${esc(w.recommendation)}</td>
    </tr>`).join("");
}

async function loadSkills(){
  const data = await (await fetch("/api/skills")).json();
  const box = document.getElementById("skills");
  if(!(data.skills||[]).length){ box.innerHTML='<div class="sub">~/.claude/skills 下没有 skill</div>'; return; }
  box.innerHTML = data.skills.map(s=>`
    <div class="skill">
      <div>
        <div class="nm">${esc(s.name)}</div>
        <div class="ds">${esc(s.description)}</div>
        <div class="flow">自主度 = 桶向下流动的档位</div>
      </div>
      <select data-name="${esc(s.name)}">
        ${data.levels.map(l=>`<option value="${l.value}" ${l.value===s.autonomy?"selected":""}>${l.label}</option>`).join("")}
      </select>
    </div>`).join("");
  box.querySelectorAll("select").forEach(sel=>{
    sel.addEventListener("change", async e=>{
      const r = await fetch("/api/skills",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:sel.dataset.name, autonomy:sel.value})});
      const j = await r.json();
      sel.style.borderColor = j.ok ? "var(--good)" : "var(--bad)";
      setTimeout(()=>sel.style.borderColor="var(--line)", 900);
    });
  });
}

// 三块各自独立加载：任一失败只在本块显示错误，不连累其它块
loadBanner().catch(e=>{ document.getElementById("banner").innerHTML=`<div class="err">省时数据载入失败：${esc(e.message)}</div>`; });
loadMap().catch(e=>{ document.getElementById("mapbody").innerHTML=`<tr><td colspan="6" class="err">Map 载入失败：${esc(e.message)}</td></tr>`; });
loadSkills().catch(e=>{ document.getElementById("skills").innerHTML=`<div class="err">Skills 载入失败：${esc(e.message)}</div>`; });
</script>
</body>
</html>
